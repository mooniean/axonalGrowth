# CI pipeline for pyaxon
# Dependency manager : uv
# Linter / formatter : ruff  (replaces flake8)
# Test runner        : pytest + pytest-cov
# Triggered on every push and pull-request targeting master.

name: pyaxon

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Test against the minimum supported version and the current stable release.
        python-version: ["3.9", "3.13"]

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Install uv ──────────────────────────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true          # cache the uv download and package cache
          cache-dependency-glob: "pyproject.toml"

      # ── Set up Python ────────────────────────────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ── Install project + dev dependencies via uv ────────────────────────────
      - name: Install dependencies
        run: uv sync --group dev

      # ── Lint with ruff (errors + undefined names only – hard fail) ────────────
      - name: Lint (hard – syntax errors and undefined names)
        run: uv run ruff check --select E9,F63,F7,F82 pyaxon tests

      # ── Lint with ruff (full rule set – informational, soft fail) ─────────────
      - name: Lint (full rule set)
        run: uv run ruff check pyaxon tests
        continue-on-error: true

      # ── Format check ─────────────────────────────────────────────────────────
      - name: Format check
        run: uv run ruff format --check pyaxon tests
        continue-on-error: true

      # ── Tests with coverage ───────────────────────────────────────────────────
      - name: Test with pytest
        run: |
          uv run pytest tests/ \
            --junitxml=junit/test-results-${{ matrix.python-version }}.xml \
            --cov=pyaxon \
            --cov-branch \
            --cov-report=xml \
            --cov-report=html

      # ── Upload JUnit test report ──────────────────────────────────────────────
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()                  # upload even if tests fail
        with:
          name: test-results-${{ matrix.python-version }}
          path: junit/test-results-${{ matrix.python-version }}.xml

      # ── Upload coverage report ────────────────────────────────────────────────
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/
